version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: pg_db
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  flyway:
    image: flyway/flyway
    depends_on:
      - postgres
    volumes:
      - ./migrations:/flyway/sql
    command: >
      -url=jdbc:postgresql://postgres:5432/taskdb
      -user=admin
      -password=admin123
      migrate

volumes:
  pgdata: